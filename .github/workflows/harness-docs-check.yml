name: Harness Docs Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  required-files:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify required harness files
        shell: bash
        run: |
          set -euo pipefail
          required_files=(
            "README.md"
            "AGENTS.md"
            ".harness/HARNESS.md"
            ".harness/templates/requirements.template.md"
            ".harness/templates/architecture.template.md"
            ".harness/templates/implementation-plan.template.md"
            ".harness/checklists/definition-of-ready.md"
            ".harness/checklists/definition-of-done.md"
            "docs/requirements.md"
            "docs/architecture.md"
          )

          for file in "${required_files[@]}"; do
            test -f "$file" || {
              echo "Missing required file: $file"
              exit 1
            }
          done
